<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CHESS BASIC V1.0</title>
<style>
@import url('https://fonts.cdnfonts.com/css/c64-pro-mono');

:root {
  --bg:        #20398D;
  --border:    #6076C5;
  --text:      #6076C5;
  --white:     #FFFFFF;
  --cyan:      #AAFFEE;
  --yellow:    #EEEE77;
  --green:     #00CC55;
  --lgreen:    #AAFF66;
  --lred:      #FF7777;
  --orange:    #DD8855;
  --violet:    #CC44CC;
  --grey:      #777777;
  --dark:      #10206d;
  --rowborder: #2a3f80;
  --cell:      clamp(36px, 11vw, 48px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #111;
  font-family: 'C64 Pro Mono', 'C64_Pro_Mono-STYLE', 'Courier New', monospace;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px 8px 32px;
}

/* ── PHONE SHELL ───────────────────────────────────────────── */
.phone-shell {
  width: min(375px, 100vw - 16px);
  background: #1a1a1a;
  border-radius: 44px;
  padding: 16px 12px;
  box-shadow: 0 0 0 2px #333, 0 0 0 4px #1a1a1a, 0 8px 40px rgba(0,0,0,0.7);
  position: relative;
}
.phone-notch {
  width: 80px; height: 20px;
  background: #1a1a1a;
  border-radius: 0 0 14px 14px;
  margin: 0 auto 8px;
}
.phone-shell::before {
  content: '';
  position: absolute;
  left: -4px; top: 80px;
  width: 3px; height: 60px;
  background: #333; border-radius: 2px 0 0 2px;
  box-shadow: 0 30px 0 #333, 0 60px 0 #333;
}
.phone-shell::after {
  content: '';
  position: absolute;
  right: -4px; top: 100px;
  width: 3px; height: 70px;
  background: #333; border-radius: 0 2px 2px 0;
}
.phone-home {
  width: 42px; height: 42px;
  background: #222; border-radius: 50%;
  margin: 10px auto 0;
  border: 2px solid #333;
}

/* ── C64 SCREEN ────────────────────────────────────────────── */
.c64-screen {
  background: var(--bg);
  border: 12px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  font-family: 'C64 Pro Mono', 'Courier New', monospace;
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
  letter-spacing: 0.03em;
  min-height: 580px;
  display: flex;
  flex-direction: column;
}

/* ── TITLE BAR ─────────────────────────────────────────────── */
.c-bar {
  background: var(--border);
  color: var(--bg);
  padding: 7px 10px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.c-bar-btn {
  background: var(--bg);
  color: var(--border);
  border: none;
  font-family: inherit;
  font-size: 10px;
  padding: 2px 6px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  min-height: 22px;
}

/* ── STATUS STRIP ──────────────────────────────────────────── */
.c-status {
  padding: 5px 10px;
  border-bottom: 1px solid var(--rowborder);
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  flex-shrink: 0;
  min-height: 28px;
}
.status-dot { font-size: 8px; }
.status-text { flex: 1; }
.status-diff { margin-left: auto; color: var(--grey); }

/* ── BOOT SCREEN ───────────────────────────────────────────── */
#boot-screen {
  flex: 1;
  padding: 12px 10px;
  font-size: 11px;
  line-height: 1.8;
  cursor: pointer;
}
#boot-screen .w { color: var(--white); }
.cursor {
  display: inline-block;
  width: 8px; height: 11px;
  background: var(--text);
  vertical-align: bottom;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── GAME SCREEN ───────────────────────────────────────────── */
#game-screen {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

/* ── CHESS BOARD WRAPPER ───────────────────────────────────── */
.board-wrap {
  padding: 6px 8px 4px;
  display: flex;
  justify-content: center;
  flex-shrink: 0;
}
.board-outer {
  display: flex;
  align-items: flex-start;
  gap: 4px;
}
.board-ranks {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding-top: 2px;
  font-size: 9px;
  color: var(--grey);
  line-height: 1;
}
.board-rank-label {
  height: var(--cell);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 12px;
}
.board-col {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.board-files {
  display: flex;
  gap: 0;
  padding-left: 16px;
  font-size: 9px;
  color: var(--grey);
  line-height: 1;
  margin-top: 2px;
}
.board-file-label {
  width: var(--cell);
  text-align: center;
}

/* ── BOARD GRID ────────────────────────────────────────────── */
.board {
  display: grid;
  grid-template-columns: repeat(8, var(--cell));
  grid-template-rows: repeat(8, var(--cell));
  border: 1px solid var(--border);
}
.cell {
  width: var(--cell);
  height: var(--cell);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(22px, 6.5vw, 30px);
  cursor: pointer;
  position: relative;
  transition: background-color 0.1s;
  user-select: none;
  -webkit-user-select: none;
}
.cell.light { background: var(--bg); }
.cell.dark  { background: var(--dark); }

/* Hover effect for touchscreens (not needed) */
.cell:active { opacity: 0.8; }

/* Selection states */
.cell.selected {
  background: var(--cyan) !important;
}
.cell.selected .piece {
  color: var(--bg) !important;
}
.cell.legal-move::after {
  content: '';
  position: absolute;
  width: 30%;
  height: 30%;
  border-radius: 50%;
  background: var(--lgreen);
  opacity: 0.7;
  pointer-events: none;
}
.cell.legal-capture::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 2px;
  border: 2px solid var(--lgreen);
  opacity: 0.7;
  pointer-events: none;
}
.cell.last-move { background: rgba(238,238,119,0.2) !important; }
.cell.in-check  { background: rgba(255,119,119,0.3) !important; }

/* ── PIECES ────────────────────────────────────────────────── */
.piece {
  line-height: 1;
  pointer-events: none;
}
.piece.white { color: var(--white); text-shadow: 0 0 2px rgba(0,0,40,0.8); }
.piece.black { color: var(--yellow); }

/* ── GAME BODY (SCROLLABLE) ─────────────────────────────────── */
.game-body {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  -webkit-overflow-scrolling: touch;
}

/* ── SECTION HEADER ────────────────────────────────────────── */
.c-sec {
  color: var(--yellow);
  font-size: 10px;
  letter-spacing: 0.1em;
  margin: 8px 0 4px;
}
.c-sec:first-child { margin-top: 0; }

/* ── MOVE LOG ──────────────────────────────────────────────── */
.move-log {
  border: 1px solid var(--rowborder);
  max-height: 90px;
  overflow-y: auto;
  padding: 4px 8px;
  font-size: 10px;
  color: var(--cyan);
  -webkit-overflow-scrolling: touch;
}
.move-entry { line-height: 1.7; white-space: nowrap; }
.move-num   { color: var(--grey); margin-right: 4px; }

/* ── DIFFICULTY BUTTONS ─────────────────────────────────────── */
.diff-row {
  display: flex;
  gap: 6px;
  margin: 4px 0;
}
.diff-btn {
  flex: 1;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 10px;
  padding: 7px 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  min-height: 36px;
}
.diff-btn.active {
  background: var(--border);
  color: var(--bg);
}

/* ── ACTION BUTTONS ─────────────────────────────────────────── */
.action-row {
  display: flex;
  gap: 6px;
  margin: 6px 0 2px;
}
.c-btn {
  flex: 1;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 10px;
  padding: 9px 6px;
  border: 1px solid;
  cursor: pointer;
  min-height: 36px;
  background: transparent;
}
.c-btn.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
.c-btn.danger  { color: var(--lred); border-color: var(--lred); }
.c-btn.neutral { color: var(--text); border-color: var(--border); }

/* ── FOOTER ─────────────────────────────────────────────────── */
.c-footer {
  padding: 6px 10px 8px;
  font-size: 9px;
  color: var(--violet);
  text-align: center;
  border-top: 1px solid var(--rowborder);
  flex-shrink: 0;
}

/* ── PROMOTION MODAL ─────────────────────────────────────────── */
#promo-modal {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(16,32,109,0.92);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
}
#promo-modal.visible { display: flex; }
.promo-title {
  color: var(--white);
  font-size: 12px;
  text-align: center;
  letter-spacing: 0.08em;
}
.promo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
  max-width: 220px;
}
.promo-btn {
  font-family: inherit;
  text-transform: uppercase;
  font-size: 11px;
  padding: 12px;
  border: 1px solid var(--border);
  background: var(--dark);
  color: var(--cyan);
  cursor: pointer;
  text-align: center;
  min-height: 52px;
  letter-spacing: 0.06em;
}
.promo-btn:active { background: var(--border); color: var(--bg); }
.promo-piece { font-size: 24px; display: block; margin-bottom: 2px; }

/* ── CONFIRM MODAL ─────────────────────────────────────────── */
#confirm-modal {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(16,32,109,0.92);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  padding: 20px;
}
#confirm-modal.visible { display: flex; }
.confirm-text {
  color: var(--white);
  font-size: 11px;
  text-align: center;
  line-height: 1.8;
  letter-spacing: 0.06em;
}
.confirm-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 220px;
}
.confirm-row .c-btn { font-size: 11px; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="phone-notch"></div>

  <!-- C64 Screen -->
  <div class="c64-screen" style="position:relative;">

    <!-- BOOT SCREEN -->
    <div id="boot-screen" onclick="skipBoot()">
      <div id="boot-text"></div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" style="display:none;flex-direction:column;flex:1;">

      <!-- Title bar -->
      <div class="c-bar">
        &#9658; CHESS BASIC V1.0
        <div style="display:flex;gap:4px;">
          <button class="c-bar-btn" onclick="flipBoard()">FLIP</button>
          <button class="c-bar-btn" onclick="showConfirmQuit()">QUIT</button>
        </div>
      </div>

      <!-- Status strip -->
      <div class="c-status">
        <span class="status-dot" id="status-dot" style="color:var(--lgreen);">&#9679;</span>
        <span class="status-text" id="status-text">YOUR TURN</span>
        <span class="status-diff" id="status-diff">ADV</span>
      </div>

      <!-- Chess Board -->
      <div class="board-wrap">
        <div class="board-col">
          <div class="board-outer">
            <div class="board-ranks" id="rank-labels"></div>
            <div>
              <div class="board" id="board"></div>
              <div class="board-files" id="file-labels"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Scrollable game body -->
      <div class="game-body">
        <div class="c-sec">&#9658; MOVE HISTORY</div>
        <div class="move-log" id="move-log">
          <div class="move-entry" style="color:var(--grey);">RUN CHESS</div>
        </div>

        <div class="c-sec" style="margin-top:8px;">&#9658; DIFFICULTY</div>
        <div class="diff-row">
          <button class="diff-btn" id="diff-1" onclick="setDifficulty(1)">NOVICE</button>
          <button class="diff-btn active" id="diff-2" onclick="setDifficulty(2)">ADVANCED</button>
          <button class="diff-btn" id="diff-3" onclick="setDifficulty(3)">MASTER</button>
        </div>

        <div class="action-row">
          <button class="c-btn primary" onclick="showConfirmNewGame()">NEW GAME</button>
          <button class="c-btn neutral" onclick="undoMove()">UNDO</button>
        </div>
      </div>

      <div class="c-footer">&#9733; IN HONOR OF OPEN SOURCE DEVELOPERS &#9733;</div>
    </div>

    <!-- PROMOTION MODAL -->
    <div id="promo-modal">
      <div class="promo-title">PROMOTE PAWN TO:</div>
      <div class="promo-grid">
        <button class="promo-btn" onclick="doPromotion('q')"><span class="promo-piece">&#9813;</span>QUEEN</button>
        <button class="promo-btn" onclick="doPromotion('r')"><span class="promo-piece">&#9814;</span>ROOK</button>
        <button class="promo-btn" onclick="doPromotion('b')"><span class="promo-piece">&#9815;</span>BISHOP</button>
        <button class="promo-btn" onclick="doPromotion('n')"><span class="promo-piece">&#9816;</span>KNIGHT</button>
      </div>
    </div>

    <!-- CONFIRM NEW GAME MODAL -->
    <div id="confirm-modal">
      <div class="confirm-text" id="confirm-text">RUN NEW GAME?<br>CURRENT GAME WILL BE LOST.</div>
      <div class="confirm-row">
        <button class="c-btn primary" onclick="confirmYes()">YES</button>
        <button class="c-btn danger"  onclick="confirmNo()">NO</button>
      </div>
    </div>

  </div><!-- end c64-screen -->
  <div class="phone-home"></div>
</div><!-- end phone-shell -->

     Piece-square tables inspired by classical BASIC chess programs

<script>
/* ── PIECE VALUES ───────────────────────────────────────────── */
const PIECE_VAL = { p:100, n:320, b:330, r:500, q:900, k:20000 };

/* ── PIECE-SQUARE TABLES (white's perspective) ─────────────── */
const PST = {
  p: [[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],
      [5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],
      [5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]],
  n: [[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],
      [-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],
      [-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],
      [-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]],
  b: [[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],
      [-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],
      [-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],
      [-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]],
  r: [[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],
      [-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],
      [-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]],
  q: [[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],
      [-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],
      [0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],
      [-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]],
  k: [[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],
      [-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],
      [-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],
      [20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]]
};

function evalBoard(chess) {
  if (chess.in_checkmate()) return chess.turn() === 'w' ? -99999 : 99999;
  if (chess.in_stalemate() || chess.in_draw()) return 0;
  let score = 0;
  const board = chess.board();
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const pc = board[r][c];
      if (!pc) continue;
      const pstRow = pc.color === 'w' ? 7 - r : r;
      const v = PIECE_VAL[pc.type] + PST[pc.type][pstRow][c];
      score += pc.color === 'w' ? v : -v;
    }
  }
  return score;
}

function minimax(chess, depth, alpha, beta, isMax) {
  if (depth === 0 || chess.game_over()) return evalBoard(chess);
  const moves = chess.moves({ verbose: true });
  // Sort: captures first (better pruning)
  moves.sort((a, b) => (b.captured ? 1 : 0) - (a.captured ? 1 : 0));
  if (isMax) {
    let best = -Infinity;
    for (const mv of moves) {
      chess.move(mv);
      best = Math.max(best, minimax(chess, depth - 1, alpha, beta, false));
      chess.undo();
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const mv of moves) {
      chess.move(mv);
      best = Math.min(best, minimax(chess, depth - 1, alpha, beta, true));
      chess.undo();
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function getBestMove(chess, depth) {
  const moves = chess.moves({ verbose: true });
  if (!moves.length) return null;
  let bestMove = null, bestVal = Infinity;
  moves.sort((a, b) => (b.captured ? 1 : 0) - (a.captured ? 1 : 0));
  for (const mv of moves) {
    chess.move(mv);
    const val = minimax(chess, depth - 1, -Infinity, Infinity, true);
    chess.undo();
    if (val < bestVal) { bestVal = val; bestMove = mv; }
  }
  return bestMove;
}

<!-- ═══════════════════════════════════════════════════════════
     GAME UI CONTROLLER
     ═══════════════════════════════════════════════════════════ -->
<script>
/* ── UNICODE PIECE GLYPHS ───────────────────────────────────── */
const GLYPH = {
  w: { k:'♔', q:'♕', r:'♖', b:'♗', n:'♘', p:'♙' },
  b: { k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' }
};

/* ── GAME STATE ─────────────────────────────────────────────── */
let chess         = new Chess();
let selectedSq    = null;   // 'e2'
let legalMoves    = [];     // verbose moves from selectedSq
let flipped       = false;
let difficulty    = 2;      // minimax depth
let moveLineNum   = 10;
let pendingPromo  = null;   // { from, to } awaiting promotion choice
let cpuThinking   = false;
let confirmAction = null;   // function to call on confirm yes
const DIFF_DEPTH  = { 1: 1, 2: 3, 3: 5 };
const DIFF_LABEL  = { 1: 'NOV', 2: 'ADV', 3: 'MST' };

/* ── SQUARE CONVERSION ──────────────────────────────────────── */
function squareAt(row, col) {
  const r = flipped ? row : 7 - row;
  const c = flipped ? 7 - col : col;
  return 'abcdefgh'[c] + (r + 1);
}

/* ── BUILD BOARD DOM ────────────────────────────────────────── */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const cell = document.createElement('div');
      const sq = squareAt(row, col);
      const isLight = (row + col) % 2 === 0;
      cell.className = 'cell ' + (isLight ? 'light' : 'dark');
      cell.dataset.sq = sq;
      cell.addEventListener('click', onCellClick);
      board.appendChild(cell);
    }
  }
  buildLabels();
}

function buildLabels() {
  const ranks = document.getElementById('rank-labels');
  const files = document.getElementById('file-labels');
  ranks.innerHTML = '';
  files.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    const rankNum = flipped ? row + 1 : 8 - row;
    const d = document.createElement('div');
    d.className = 'board-rank-label';
    d.textContent = rankNum;
    ranks.appendChild(d);
  }
  for (let col = 0; col < 8; col++) {
    const fileCh = flipped ? 'hgfedcba'[col] : 'abcdefgh'[col];
    const d = document.createElement('div');
    d.className = 'board-file-label';
    d.textContent = fileCh;
    files.appendChild(d);
  }
}

/* ── RENDER PIECES ──────────────────────────────────────────── */
function renderBoard() {
  const boardEl = chess.board(); // 8×8 [rank8..rank1][a..h]
  document.querySelectorAll('.cell').forEach(cell => {
    const sq = cell.dataset.sq;
    const file = sq.charCodeAt(0) - 97;        // 0-7
    const rank = parseInt(sq[1]) - 1;          // 0-7
    const piece = boardEl[7 - rank][file];     // board() row0=rank8
    // Clear old state classes
    cell.classList.remove('selected','legal-move','legal-capture','last-move','in-check');
    // Piece
    cell.innerHTML = '';
    if (piece) {
      const span = document.createElement('span');
      span.className = 'piece ' + (piece.color === 'w' ? 'white' : 'black');
      span.textContent = GLYPH[piece.color][piece.type];
      cell.appendChild(span);
    }
  });
  // Highlight last move
  const hist = chess.history({ verbose: true });
  if (hist.length > 0) {
    const last = hist[hist.length - 1];
    const fromCell = document.querySelector(`[data-sq="${last.from}"]`);
    const toCell   = document.querySelector(`[data-sq="${last.to}"]`);
    if (fromCell) fromCell.classList.add('last-move');
    if (toCell)   toCell.classList.add('last-move');
  }
  // Highlight king in check
  if (chess.in_check()) {
    const turn = chess.turn();
    const bd = chess.board();
    outer: for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const pc = bd[r][c];
        if (pc && pc.type === 'k' && pc.color === turn) {
          const sq = 'abcdefgh'[c] + (8 - r);
          const kCell = document.querySelector(`[data-sq="${sq}"]`);
          if (kCell) kCell.classList.add('in-check');
          break outer;
        }
      }
    }
  }
  // Highlight selected square and legal moves
  if (selectedSq) {
    const selCell = document.querySelector(`[data-sq="${selectedSq}"]`);
    if (selCell) selCell.classList.add('selected');
    legalMoves.forEach(mv => {
      const tgt = document.querySelector(`[data-sq="${mv.to}"]`);
      if (tgt) tgt.classList.add(mv.captured ? 'legal-capture' : 'legal-move');
    });
  }
}

/* ── CELL CLICK HANDLER ─────────────────────────────────────── */
function onCellClick(e) {
  if (cpuThinking || chess.game_over()) return;
  if (chess.turn() !== 'w') return; // only player's turn
  const sq = e.currentTarget.dataset.sq;
  if (!selectedSq) {
    // Select a piece
    const piece = chess.get(sq);
    if (piece && piece.color === 'w') {
      selectedSq = sq;
      legalMoves = chess.moves({ square: sq, verbose: true });
      renderBoard();
    }
  } else {
    // Attempt a move
    const target = legalMoves.find(m => m.to === sq);
    if (target) {
      // Check for promotion
      const promoMoves = legalMoves.filter(m => m.to === sq && m.flags.indexOf('p') >= 0);
      if (promoMoves.length > 0) {
        pendingPromo = { from: selectedSq, to: sq };
        selectedSq = null;
        legalMoves = [];
        renderBoard();
        showPromoModal();
        return;
      }
      doPlayerMove({ from: selectedSq, to: sq });
    } else {
      // Try selecting a different piece
      const piece = chess.get(sq);
      if (piece && piece.color === 'w') {
        selectedSq = sq;
        legalMoves = chess.moves({ square: sq, verbose: true });
      } else {
        selectedSq = null;
        legalMoves = [];
      }
      renderBoard();
    }
  }
}

/* ── EXECUTE PLAYER MOVE ────────────────────────────────────── */
function doPlayerMove(moveObj) {
  const result = chess.move(moveObj);
  if (!result) {
    setStatus('?SYNTAX ERROR: ILLEGAL MOVE', 'lred');
    selectedSq = null; legalMoves = [];
    renderBoard();
    return;
  }
  selectedSq = null; legalMoves = [];
  addMoveLog(result.san, 'WHITE');
  renderBoard();
  checkGameOver();
  if (!chess.game_over()) scheduleCpuMove();
}

/* ── PROMOTION ──────────────────────────────────────────────── */
function showPromoModal() {
  document.getElementById('promo-modal').classList.add('visible');
}
function hidePromoModal() {
  document.getElementById('promo-modal').classList.remove('visible');
}
function doPromotion(piece) {
  hidePromoModal();
  if (!pendingPromo) return;
  doPlayerMove({ from: pendingPromo.from, to: pendingPromo.to, promotion: piece });
  pendingPromo = null;
}

/* ── CPU MOVE ───────────────────────────────────────────────── */
function scheduleCpuMove() {
  cpuThinking = true;
  setStatus('COMPUTER THINKING...', 'orange');
  setTimeout(() => {
    const depth = DIFF_DEPTH[difficulty];
    const mv = getBestMove(chess, depth);
    if (mv) {
      const result = chess.move(mv);
      if (result) addMoveLog(result.san, 'BLACK');
    }
    cpuThinking = false;
    renderBoard();
    checkGameOver();
    if (!chess.game_over()) setStatus('YOUR TURN', 'lgreen');
  }, 50); // yield to browser to allow render
}

/* ── GAME OVER CHECK ────────────────────────────────────────── */
function checkGameOver() {
  if (chess.in_checkmate()) {
    if (chess.turn() === 'b') {
      setStatus('CONGRATULATIONS! YOU WIN!', 'lgreen');
      addSysLog('PROGRAM FINISHED. YOU WIN. READY.');
    } else {
      setStatus('GAME OVER. COMPUTER WINS.', 'lred');
      addSysLog('PROGRAM FINISHED. YOU LOSE. READY.');
    }
  } else if (chess.in_stalemate()) {
    setStatus('STALEMATE. DRAW.', 'yellow');
    addSysLog('PROGRAM FINISHED. DRAW. READY.');
  } else if (chess.in_draw()) {
    setStatus('DRAW BY REPETITION.', 'yellow');
    addSysLog('PROGRAM FINISHED. DRAW. READY.');
  } else if (chess.in_check()) {
    setStatus('WARNING: CHECK! YOUR TURN', 'orange');
  }
}

/* ── UNDO ───────────────────────────────────────────────────── */
function undoMove() {
  if (cpuThinking || chess.game_over()) return;
  chess.undo(); // undo cpu move
  chess.undo(); // undo player move
  // Remove last 2 log entries (simple approach: rebuild)
  rebuildMoveLog();
  selectedSq = null; legalMoves = [];
  renderBoard();
  setStatus('YOUR TURN', 'lgreen');
}

function rebuildMoveLog() {
  const log = document.getElementById('move-log');
  log.innerHTML = '<div class="move-entry" style="color:var(--grey);">RUN CHESS</div>';
  moveLineNum = 10;
  const hist = chess.history({ verbose: true });
  hist.forEach((mv, i) => {
    addMoveLog(mv.san, i % 2 === 0 ? 'WHITE' : 'BLACK');
  });
}

/* ── FLIP BOARD ─────────────────────────────────────────────── */
function flipBoard() {
  flipped = !flipped;
  buildBoard();
  renderBoard();
}

/* ── DIFFICULTY ─────────────────────────────────────────────── */
function setDifficulty(d) {
  difficulty = d;
  ['diff-1','diff-2','diff-3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i + 1 === d);
  });
  document.getElementById('status-diff').textContent = DIFF_LABEL[d];
}

/* ── STATUS HELPERS ─────────────────────────────────────────── */
function setStatus(text, colorKey) {
  const colors = {
    lgreen: 'var(--lgreen)', lred: 'var(--lred)',
    orange: 'var(--orange)', yellow: 'var(--yellow)',
    cyan: 'var(--cyan)'
  };
  const dot   = document.getElementById('status-dot');
  const label = document.getElementById('status-text');
  label.textContent = text;
  label.style.color = colors[colorKey] || 'var(--text)';
  dot.style.color   = colors[colorKey] || 'var(--text)';
}

/* ── MOVE LOG ───────────────────────────────────────────────── */
function addMoveLog(san, side) {
  const log = document.getElementById('move-log');
  const entry = document.createElement('div');
  entry.className = 'move-entry';
  const num = String(moveLineNum).padStart(3, ' ');
  entry.innerHTML =
    `<span class="move-num">${num}</span>` +
    `<span style="color:var(--cyan);">${san.toUpperCase().padEnd(7)}</span>` +
    `<span style="color:var(--grey);font-size:9px;">(${side})</span>`;
  log.appendChild(entry);
  moveLineNum = moveLineNum >= 990 ? 10 : moveLineNum + 10;
  log.scrollTop = log.scrollHeight;
}

function addSysLog(text) {
  const log = document.getElementById('move-log');
  const entry = document.createElement('div');
  entry.className = 'move-entry';
  entry.style.color = 'var(--yellow)';
  entry.textContent = text;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

/* ── CONFIRM MODALS ─────────────────────────────────────────── */
function showConfirmNewGame() {
  document.getElementById('confirm-text').innerHTML =
    'RUN NEW GAME?<br>CURRENT GAME WILL BE LOST.';
  confirmAction = startNewGame;
  document.getElementById('confirm-modal').classList.add('visible');
}
function showConfirmQuit() {
  document.getElementById('confirm-text').innerHTML =
    'QUIT CHESS?<br>RETURN TO MAIN MENU.';
  confirmAction = () => { window.location.href = '/'; };
  document.getElementById('confirm-modal').classList.add('visible');
}
function confirmYes() {
  document.getElementById('confirm-modal').classList.remove('visible');
  if (confirmAction) { confirmAction(); confirmAction = null; }
}
function confirmNo() {
  document.getElementById('confirm-modal').classList.remove('visible');
  confirmAction = null;
}

/* ── NEW GAME ───────────────────────────────────────────────── */
function startNewGame() {
  chess = new Chess();
  selectedSq = null;
  legalMoves = [];
  cpuThinking = false;
  pendingPromo = null;
  moveLineNum = 10;
  const log = document.getElementById('move-log');
  log.innerHTML = '<div class="move-entry" style="color:var(--grey);">RUN CHESS</div>';
  buildBoard();
  renderBoard();
  setStatus('YOUR TURN', 'lgreen');
}

/* ── SERVER-SENT EVENTS (audio exit) ────────────────────────── */
function connectSSE() {
  try {
    const es = new EventSource('/chess/events');
    es.onmessage = e => {
      if (e.data === 'EXIT') window.location.href = '/';
    };
    es.onerror = () => {
      // Silently fail — dev mode / no Flask
      es.close();
    };
  } catch(err) {
    // SSE not supported or no server — ignore
  }
}

/* ── BOOT ANIMATION ─────────────────────────────────────────── */
const BOOT_LINES = [
  { text: '    **** CHESS BASIC V1.0 ****', color: 'var(--white)', delay: 0 },
  { text: '', color: '', delay: 300 },
  { text: ' 64K RAM SYSTEM  38911 BASIC BYTES FREE', delay: 350 },
  { text: ' HTTP://192.168.4.1/CHESS', color: 'var(--grey)', delay: 700 },
  { text: '', delay: 1000 },
  { text: '10 REM EASTER EGG - CHESS', delay: 1050 },
  { text: '20 REM (C) INTERCOM BRIDGE', delay: 1150 },
  { text: '', delay: 1350 },
  { text: 'READY.', delay: 1400, cursor: true },
];
const BOOT_TOTAL = 2200;

let bootSkipped = false;

function skipBoot() {
  if (bootSkipped) return;
  bootSkipped = true;
  showGame();
}

function animateBoot() {
  const container = document.getElementById('boot-text');
  container.innerHTML = '';
  BOOT_LINES.forEach(line => {
    setTimeout(() => {
      if (bootSkipped) return;
      const div = document.createElement('div');
      div.style.color = line.color || 'var(--text)';
      if (line.cursor) {
        div.innerHTML = line.text + '<span class="cursor"></span>';
      } else {
        div.textContent = line.text || '\u00A0';
      }
      container.appendChild(div);
    }, line.delay);
  });
  // After boot, type "RUN" and show game
  setTimeout(() => {
    if (bootSkipped) return;
    const container2 = document.getElementById('boot-text');
    const runDiv = document.createElement('div');
    runDiv.style.color = 'var(--white)';
    container2.appendChild(runDiv);
    typeText(runDiv, 'RUN', 80, () => {
      setTimeout(showGame, 400);
    });
  }, BOOT_TOTAL);
}

function typeText(el, text, delay, cb) {
  let i = 0;
  const interval = setInterval(() => {
    el.textContent = text.substring(0, i + 1);
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      if (cb) cb();
    }
  }, delay);
}

function showGame() {
  bootSkipped = true;
  document.getElementById('boot-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  buildBoard();
  renderBoard();
  setStatus('YOUR TURN', 'lgreen');
  connectSSE();
}

/* ── INIT ───────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  animateBoot();
});
</script>
